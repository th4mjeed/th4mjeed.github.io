baseURL: "https://th4mjeed.github.io/"
title: th4mjeed
copyright: "© Thamjeed"
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  minifyOutput: true
pagination:
  disableAliases: false
  pagerSize: 5

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Posts
          url: posts
          weight: 5
        - name: Search
          url: search/
          weight: 10
        - name: Archive
          url: /archives/
          weight: 30

 
params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
  author: Thamjeed
  search: true
  ShowArchive: true

  defaultTheme: dark
  disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  TocOpen: false
  assets:
    customCSS:
      - css/extended/custom.css
  label:
     text: ""
     icon: /images/logo.svg
     iconHeight: 34


  profileMode:
    enabled: true
    title: "Thamjeed"
    subtitle: "Linux Administrator • Linux Internals • Systems Programming"
    imageUrl: "/images/profile/avatar.png"
    imageWidth: 150
    imageHeight: 150

#  homeInfoParams:
#    Title: "'Sup? I'm Thamjeed 👋"
#    Content: >
#      I'm a Linux administrator who likes going past the "it works" layer —
#      digging into how `/proc` actually represents a running process, how
