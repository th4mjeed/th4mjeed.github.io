#      concepts show up in everyday tools.
#      <br><br>
#      This is where I write about that stuff, along with the occasional
#      side project that has nothing to do with Linux at all.

  socialIcons:
    - name: github
      title: View Profile on Github
      url: "https://github.com/th4mjeed"
    - name: linkedin
      title: View Linkedin Profile
      url: "https://www.linkedin.com/in/th4mjeed/"
    - name: email
      title: Send an E-mail
      url: "mailto:7h4mj33d@gmail.com"

  caches:
    images:
      dir: :cacheDir/images

outputs:
  home:
    - HTML
    - RSS
    - JSON
markup:
  goldmark:
    renderer:
      unsafe: true
